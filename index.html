        .btn-gen:hover { border-color: #d4af37; color: #d4af37; }
        
        .support-wa { background: #25D366; color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; display: inline-block; margin: 40px 0; font-weight: bold; }
