<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourTvSat VIP</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; overflow-x: hidden; }
        .gold { color: #d4af37; }

        /* HEADER & SATELLITE */
        .header { padding: 40px 0; position: relative; display: flex; justify-content: center; align-items: center; }
        .sat { font-size: 45px; position: absolute; animation: orbit 5s infinite ease-in-out; z-index: 5; }
        .brand { font-size: 2rem; font-weight: 900; z-index: 10; text-transform: uppercase; line-height: 1; }

        @keyframes orbit {
            0% { transform: translateX(-120px) scale(1.1); z-index: 15; }
            50% { transform: translateX(120px) scale(0.6); opacity: 0.4; z-index: 1; }
            100% { transform: translateX(-120px) scale(1.1); z-index: 15; }
        }

        /* BOUTON LUXE */
        .btn-stripe { 
            background: linear-gradient(135deg, #d4af37, #f9f295, #d4af37); 
            color: #000; padding: 20px 40px; border-radius: 50px; font-weight: 900; font-size: 1.2rem; 
            text-decoration: none; display: inline-block; box-shadow: 0 10px 30px rgba(212,175,55,0.3); border: none;
        }

        /* PANEL VIP CARDS */
        .vip-card { 
            background: #111; border: 1px solid #222; border-left: 5px solid #d4af37; 
            padding: 20px; border-radius: 12px; margin: 15px auto; max-width: 400px; text-align: left; 
        }
        .btn-gen { background: #222; color: #d4af37; border: 1px solid #d4af37; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="sat">🛰️</div>
        <h1 class="brand gold">YOURTVSAT<br><span style="font-size:0.9rem; letter-spacing:3px; color:#fff;">VIP ELITE</span></h1>
    </div>

    <div id="view-vente" style="display: block; padding: 20px;">
        <p style="color: red; font-weight: bold;">OFFRE EXCLUSIVE</p>
        <div style="font-size: 5rem; font-weight: 900; color: #d4af37;">5.55 €</div>
        <p style="color:#888; margin-bottom:30px;">PASS ANNUEL ILLIMITÉ</p>
        <a href="https://buy.stripe.com/6oU7sL9gXfgTeKuf7h" class="btn-stripe">💎 DEVENIR MEMBRE VIP</a>
    </div>

    <div id="view-vip" style="display: none; padding: 20px;">
        <h2 class="gold">ACCÈS CLIENT PRIVÉ</h2>
        <div class="vip-card">🚀 <b>IBO PLAYER</b> : Activation active</div>
        <div class="vip-card">🚀 <b>SMARTONE IPTV</b> : Activation active</div>
        
        <h3 style="margin-top:40px;">GÉNÉRATEUR DE TESTS</h3>
        <button class="btn-gen">OBTENIR TEST STRONG 8K</button>
        <button class="btn-gen">OBTENIR TEST NEO 4K</button>
    </div>

    <script>
        // NAVIGATION STRICTE
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const vente = document.getElementById('view-vente');
            const vip = document.getElementById('view-vip');

            if (urlParams.get('admin') === 'true' || urlParams.get('success') === 'true') {
                vente.style.display = 'none';
                vip.style.display = 'block';
            }
        })();
    </script>

</body>
</html>
