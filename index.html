<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourTvSat VIP - Deep Config v3.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; margin: 0; }
        .gold { color: #d4af37; text-shadow: 0 0 10px rgba(212,175,55,0.5); }
        .card { border: 1px solid #d4af37; border-radius: 20px; padding: 25px; max-width: 450px; margin: auto; background: #0a0a0a; box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
        .pill-container { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; }
        .pill { background: transparent; color: #d4af37; border: 1px solid #d4af37; padding: 6px 12px; border-radius: 50px; cursor: pointer; font-size: 0.75rem; transition: 0.3s; }
        .pill.active { background: #d4af37; color: #000; font-weight: bold; }
        .console { background: #000; border: 1px solid #333; color: #00ff00; font-family: monospace; font-size: 0.7rem; padding: 12px; text-align: left; border-radius: 10px; margin: 15px 0; height: 180px; overflow-y: auto; border-left: 3px solid #d4af37; }
        .btn-main { background: linear-gradient(135deg, #d4af37, #f9f295); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer; margin-bottom: 10px; }
        .btn-util { background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 8px; font-size: 0.65rem; width: 48%; cursor: pointer; }
    </style>
</head>
<body>

    <h2 class="gold">YOURTVSAT - API ANALYZER v3.0</h2>

    <div class="card">
        <div class="pill-container">
            <button class="pill active" onclick="sel('DINO_VIP', this)">DINO VIP</button>
            <button class="pill" onclick="sel('NEO4K', this)">NEO 4K</button>
            <button class="pill" onclick="sel('STRONG8K', this)">STRONG 8K</button>
            <button class="pill" onclick="sel('FUEGO', this)">FUEGO TV</button>
        </div>

        <button class="btn-main" onclick="startTest()">⚡ GÉNÉRER TEST (24H)</button>
        
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <button class="btn-util" onclick="checkCredits()">💰 CRÉDITS</button>
            <button class="btn-util" onclick="scanBouquets()" style="border-color: #d4af37; color: #d4af37;">🔍 SCAN BOUQUETS</button>
        </div>
        
        <div class="console" id="log">Prêt pour l'identification...</div>
    </div>

    <script>
        const CONFIG = {
            DINO_VIP: { url: "https://tvpluspanel.net/api/api.php", key: "a541fa9acb43c9be2f2759ca4ac5a47c", type: "DINO" },
            NEO4K:    { url: "https://neo4kpro.me/api/api.php", key: "990f58084a19da19da13831da85aaa3d", type: "STD" },
            STRONG8K: { url: "https://my8k.me/api/api.php", key: "fbe7199e1b0ea7d1f604bb1d930afa51", type: "STD" },
            FUEGO:    { url: "http://api-cdn-fug.com/api/dev_api.php", key: "27F6CD585F600B5E8F35C88F5D19016C9101CD354BD69BE8", type: "DEV" }
        };

        let selected = "DINO_VIP";
        const l = (msg) => { const e = document.getElementById('log'); e.innerHTML += `<br>> ${msg}`; e.scrollTop = e.scrollHeight; };

        function sel(k, b) { selected = k; document.querySelectorAll('.pill').forEach(x => x.classList.remove('active')); b.classList.add('active'); }

        async function apiCall(fullUrl) {
            try {
                let r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(fullUrl)}`);
                let j = await r.json();
                return typeof j.contents === 'string' ? JSON.parse(j.contents) : j.contents;
            } catch (e) {
                let r = await fetch(`https://corsproxy.io/?${encodeURIComponent(fullUrl)}`);
                return await r.json();
            }
        }

        async function checkCredits() {
            l(`Vérification crédits...`);
            const c = CONFIG[selected];
            const res = await apiCall(`${c.url}?action=me&api_key=${c.key}`);
            l(`Résultat: ${res.credits || res.message || JSON.stringify(res)}`);
        }

        async function scanBouquets() {
            l(`🔍 Récupération des bouquets pour ${selected}...`);
            const c = CONFIG[selected];
            try {
                // On teste les deux actions possibles selon le type de panel
                const action = (c.type === "DEV") ? "action=package" : "action=packages";
                const res = await apiCall(`${c.url}?${action}&api_key=${c.key}`);
                
                if (Array.isArray(res)) {
                    l(`Trouvé ${res.length} bouquets :`);
                    res.slice(0, 10).forEach(p => {
                        l(`- [ID: ${p.id || p.package_id}] ${p.name || p.package_name}`);
                    });
                    l("...");
                } else if (res.packages) {
                    l(`Bouquets: ${JSON.stringify(res.packages).substring(0,100)}`);
                } else {
                    l(`Réponse brute: ${JSON.stringify(res).substring(0,80)}`);
                }
            } catch(e) { l("🚨 Erreur lors du scan."); }
        }

        async function startTest() {
            l(`Tentative Test sur ${selected}...`);
            const c = CONFIG[selected];
            // Si on ne connaît pas l'ID, on tente par défaut
            const p = (c.type === "STD" || c.type === "DINO") 
                ? `action=trial&type=m3u&api_key=${c.key}` 
                : `action=user&type=create&package_id=1&api_key=${c.key}`;
            
            const res = await apiCall(c.url + "?" + p);
            l(`Réponse: ${JSON.stringify(res).substring(0,60)}`);
        }
    </script>
</body>
</html>
