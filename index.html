<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRONG 8K CHAMPION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #d4af37; --dark: #000; --green: #00ff00; }
        body { background: var(--dark); color: #fff; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        .card { border: 2px solid var(--gold); border-radius: 25px; padding: 25px; max-width: 400px; margin: auto; background: #050505; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .console { background: #000; border: 1px solid #222; color: var(--green); font-family: monospace; font-size: 0.75rem; padding: 15px; text-align: left; border-radius: 12px; margin: 15px 0; height: 120px; overflow-y: auto; border-left: 3px solid var(--gold); white-space: pre-wrap; }
        .btn-strong { background: linear-gradient(135deg, #cc0000, #ff4d4d); color: #fff; border: none; padding: 20px; border-radius: 15px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 1rem; box-shadow: 0 5px 15px rgba(204,0,0,0.3); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(10px); }
        .m-box { background: #111; border: 2px solid var(--gold); padding: 25px; border-radius: 25px; width: 85%; max-width: 350px; }
        #qrcode { background: #fff; padding: 10px; display: inline-block; border-radius: 10px; margin: 15px 0; }
    </style>
</head>
<body>

    <h1 style="color:var(--gold); margin-top: 30px;">STRONG 8K VIP</h1>

    <div class="card">
        <button class="btn-strong" onclick="generateStrong()">⚡ GÉNÉRER TEST STRONG 8K</button>
        <div class="console" id="log">> SYSTÈME CHAMPION PRÊT.
> Mode : SECURE (sub=99) actif.</div>
    </div>

    <div id="modal" class="modal"><div class="m-box">
        <h2 style="color:var(--gold)">TEST PRÊT</h2>
        <div id="url" style="background:#000; padding:12px; border-radius:10px; color:var(--green); font-size:0.7rem; word-break:break-all; border: 1px solid #333; margin-bottom:10px;"></div>
        <div id="qrcode"></div>
        <button onclick="copy()" style="background:var(--gold); border:none; padding:15px; width:100%; border-radius:12px; font-weight:bold; cursor:pointer; color:#000;">📋 COPIER LE LIEN</button>
        <p onclick="closeM()" style="color:#666; cursor:pointer; margin-top:20px;">[ FERMER ]</p>
    </div></div>

    <script>
        // --- CONFIGURATION STRONG 8K ---
        const STRONG_API = "https://strong-panel-url.com/api/api.php"; // Remplace par l'URL de ton panel
        const STRONG_KEY = "TA_CLE_API_STRONG"; // Remplace par ta clé API
        const STRONG_DNS = "strong-dns-flux.com:80"; // Remplace par le DNS du flux
        // -------------------------------

        const l = (m) => { const e = document.getElementById('log'); e.innerText += `\n> ${m}`; e.scrollTop = e.scrollHeight; };

        async function generateStrong() {
            if(STRONG_KEY.includes("TA_CLE")) {
                alert("Erreur : Configure d'abord ta clé API dans le code !");
                return;
            }

            // Sécurité héritée de Dino
            if(!confirm("⚠️ SÉCURITÉ : As-tu des 'Demo Tickets' sur ton panel Strong ?\n\nSi non, le panel pourrait consommer 1 CRÉDIT RÉEL.")) return;

            l("Lancement du test Strong 8K...");
            const target = `${STRONG_API}?action=new&type=m3u&sub=99&pack=all&api_key=${STRONG_KEY}`;
            
            try {
                l("Connexion sécurisée via Proxy...");
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(target)}&t=${Date.now()}`);
                const data = await response.json();
                const res = JSON.parse(data.contents)[0] || JSON.parse(data.contents);

                if (res.statut === "vrai" || res.status === "true") {
                    let finalUrl = res.url;
                    
                    // Correction automatique du bug DNS
                    if(finalUrl.includes("http:///")) {
                        finalUrl = finalUrl.replace("http:///", `http://${STRONG_DNS}/`);
                        l("🔧 Correction DNS appliquée.");
                    }

                    document.getElementById('url').innerText = finalUrl;
                    document.getElementById("qrcode").innerHTML = "";
                    new QRCode(document.getElementById("qrcode"), { text: finalUrl, width: 150, height: 150 });
                    document.getElementById('modal').style.display = 'flex';
                    l("✅ SUCCÈS : Test généré !");
                } else {
                    l(`❌ REFUS : ${res.message || "Plus de tickets démo."}`);
                }
            } catch (e) {
                l("🚨 ERREUR RÉSEAU : Le proxy est saturé.");
            }
        }

        function copy() {
            navigator.clipboard.writeText(document.getElementById('url').innerText);
            alert("Lien copié !");
        }

        function closeM() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
