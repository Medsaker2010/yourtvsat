<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourTvSat VIP v5.0 - Sécurité Totale</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #d4af37; --dark: #050505; --green: #00ff00; }
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; margin: 0; }
        .gold { color: var(--gold); text-shadow: 0 0 10px rgba(212,175,55,0.3); }
        .card { border: 1px solid var(--gold); border-radius: 25px; padding: 30px; max-width: 450px; margin: auto; background: #0a0a0a; box-shadow: 0 20px 50px rgba(0,0,0,0.9); position: relative; overflow: hidden; }
        .card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
        .console { background: #000; border: 1px solid #222; color: var(--green); font-family: 'Courier New', monospace; font-size: 0.75rem; padding: 15px; text-align: left; border-radius: 12px; margin: 20px 0; height: 150px; overflow-y: auto; border-left: 3px solid var(--gold); }
        .btn-main { background: linear-gradient(135deg, var(--gold), #f9f295); color: #000; border: none; padding: 20px; border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-main:active { transform: scale(0.98); }
        .status-bar { display: flex; justify-content: space-around; margin-top: 15px; font-size: 0.7rem; color: #666; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: #111; border: 2px solid var(--gold); padding: 30px; border-radius: 30px; width: 85%; max-width: 380px; }
        #qrcode { background: #fff; padding: 12px; display: inline-block; border-radius: 15px; margin: 20px 0; box-shadow: 0 0 20px var(--gold); }
    </style>
</head>
<body>

    <h1 class="gold">YOURTVSAT <span style="font-size: 0.5em; vertical-align: middle; opacity: 0.6;">v5.0</span></h1>

    <div class="card">
        <button class="btn-main" onclick="safeGenerate()">⚡ GÉNÉRER TEST DINO</button>
        
        <div class="status-bar">
            <span>Server: DINO VIP</span>
            <span>ID: 30745</span>
            <span>Mode: SECURE</span>
        </div>

        <div class="console" id="log">SYSTÈME PRÊT.
> Protection crédits active.
> Host forcé : line.dndnscloud.ru</div>
    </div>

    <div id="m" class="modal"><div class="modal-content">
        <h2 class="gold">TEST DISPONIBLE</h2>
        <div id="res" style="background:#000; padding:15px; border-radius:12px; color:var(--green); font-size:0.7rem; word-break:break-all; border: 1px solid #333;"></div>
        <div id="qrcode"></div>
        <button onclick="copyLink()" style="background:var(--gold); border:none; padding:15px; width:100%; border-radius:12px; font-weight:bold; cursor:pointer;">📋 COPIER LE LIEN</button>
        <p onclick="document.getElementById('m').style.display='none'" style="color:#666; cursor:pointer; margin-top:20px; font-size:0.8rem;">[ FERMER ]</p>
    </div></div>

    <script>
        const API_KEY = "a541fa9acb43c9be2f2759ca4ac5a47c";
        const API_URL = "https://tvpluspanel.net/api/api.php";
        const FIXED_HOST = "http://line.dndnscloud.ru/";
        
        const l = (msg) => { const e = document.getElementById('log'); e.innerHTML += `\n> ${msg}`; e.scrollTop = e.scrollHeight; };

        async function safeGenerate() {
            // Triple confirmation de sécurité
            if(!confirm("⚠️ SÉCURITÉ : As-tu des 'Demo Tickets' sur ton panel ?")) return;
            if(!confirm("⚠️ RAPPEL : Si non, Dino risque de consommer 1 CRÉDIT RÉEL. Continuer ?")) return;

            l("Lancement sécurisé...");
            const target = `${API_URL}?action=new&type=m3u&sub=99&pack=30745&api_key=${API_KEY}`;
            
            try {
                // Utilisation d'un proxy rapide
                const r = await fetch(`https://corsproxy.io/?${encodeURIComponent(target)}`);
                const d = await r.json();
                const res = Array.isArray(d) ? d[0] : d;

                if (res.statut === "vrai" || res.status === "true") {
                    let finalUrl = res.url;
                    
                    // Réparation automatique du host si manquant
                    if(finalUrl.includes("http:///")) {
                        finalUrl = finalUrl.replace("http:///", FIXED_HOST);
                        l("Correction Host appliquée.");
                    }

                    document.getElementById('res').innerText = finalUrl;
                    document.getElementById("qrcode").innerHTML = "";
                    new QRCode(document.getElementById("qrcode"), { text: finalUrl, width: 160, height: 160 });
                    document.getElementById('m').style.display = 'flex';
                    l("✅ RÉUSSITE (Mode Démo)");
                } else {
                    l(`❌ REFUS PANEL : ${res.message || "Plus de tickets démo."}`);
                    alert("ERREUR : Ton panel refuse la création gratuite (Tickets épuisés).");
                }
            } catch (e) {
                l("🚨 ERREUR RÉSEAU : Le proxy est saturé.");
            }
        }

        function copyLink() {
            navigator.clipboard.writeText(document.getElementById('res').innerText);
            alert("Lien copié dans le presse-papier !");
        }
    </script>
</body>
</html>
