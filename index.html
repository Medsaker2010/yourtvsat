<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourTvSat - Panel VIP</title>
    <style>
        /* --- DESIGN LUXUEUX YOURTVSAT --- */
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: #d4af37; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }

        /* Onglets Arrondis (Pill Style) */
        .yts-pill-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            padding: 20px;
            background: rgba(26, 26, 26, 0.8);
            border-radius: 30px;
            border: 1px solid #333;
            max-width: 600px;
        }

        .pill-btn {
            background: transparent;
            color: #d4af37;
            border: 2px solid #d4af37;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 700;
        }

        .pill-btn.active {
            background: #008000;
            color: #fff;
            border-color: #00ff00;
            box-shadow: 0 0 15px rgba(0, 128, 0, 0.6);
            transform: scale(1.05);
        }

        /* Bouton Rectangulaire Doré */
        .yts-rect-btn {
            background: linear-gradient(135deg, #d4af37 0%, #f9f295 50%, #d4af37 100%);
            color: #000;
            border: none;
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            transition: 0.3s;
            margin-top: 40px;
            width: 100%;
            max-width: 450px;
        }

        .yts-rect-btn:hover { transform: translateY(-3px); filter: brightness(1.1); }

        /* Modal (Pop-up) */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: #111; border: 2px solid #d4af37; width: 90%; max-width: 400px;
            border-radius: 20px; padding: 25px; text-align: center;
        }
        .access-box { background: #1a1a1a; padding: 15px; border-radius: 10px; border-left: 5px solid #008000; text-align: left; margin: 20px 0; }
        .close-modal { color: #d4af37; float: right; font-size: 28px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>YourTvSat VIP Panel</h1>

    <div class="yts-pill-container">
        <button class="pill-btn active" onclick="selectServer('STRONG8K', this)">STRONG 8K</button>
        <button class="pill-btn" onclick="selectServer('NEO4K', this)">NEO 4K</button>
        <button class="pill-btn" onclick="selectServer('NEXON4K', this)">NEXON 4K</button>
        <button class="pill-btn" onclick="selectServer('EAGLE4K', this)">EAGLE 4K</button>
        <button class="pill-btn" onclick="selectServer('FUEGO', this)">FUEGO TV</button>
        <button class="pill-btn" onclick="selectServer('DINO_VIP', this)">DINO VIP</button>
    </div>

    <button id="mainLaunchBtn" class="yts-rect-btn" onclick="startProcess()">
        🚀 OBTENIR MON ACCÈS GRATUIT
    </button>

    <div id="accessModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 style="color:#d4af37">🏆 ACCÈS GÉNÉRÉ</h2>
            <div id="pointsEarned" style="color:#00ff00; font-weight:bold;"></div>
            <div class="access-box">
                <p>🌐 <b>Host:</b> <span id="resHost"></span></p>
                <p>👤 <b>User:</b> <span id="resUser"></span></p>
                <p>🔑 <b>Pass:</b> <span id="resPass"></span></p>
            </div>
            <button onclick="copyAccess()" style="background:#d4af37; border:none; padding:10px; border-radius:5px; cursor:pointer; width:100%; font-weight:bold;">📋 COPIER TOUT</button>
        </div>
    </div>

    <script>
        /* --- CONFIGURATION & MOTEUR --- */
        const CONFIG_GLOBAL = {
            STRONG8K: { url: "https://my8k.me/api/api.php", key: "fbe7199e1b0ea7d1f604bb1d930afa51", type: "STD", pack: "all" },
            NEO4K:    { url: "https://neo4kpro.me/api/api.php", key: "990f58084a19da19da13831da85aaa3d", type: "STD", pack: "all" },
            NEXON4K:  { url: "http://api-connect.icu/api/dev_api.php", key: "90E655F4EC3A04B518A98B189D2E62BE4E18BDBA2E2F7114", type: "DEV", pack: "1" },
            EAGLE4K:  { url: "http://api-elg-26.com/api/dev_api.php", key: "A0F121281A26DB634862390DC531DA6D204DD91E74516071", type: "DEV", pack: "1" },
            FUEGO:    { url: "http://api-cdn-fug.com/api/dev_api.php", key: "27F6CD585F600B5E8F35C88F5D19016C9101CD354BD69BE8", type: "DEV", pack: "1" },
            DINO_VIP: { url: "https://tvpluspanel.net/api/api.php", key: "a541fa9acb43c9be2f2759ca4ac5a47c", type: "DINO", pack: "all" }
        };

        let selectedServer = "STRONG8K";

        function selectServer(serverKey, btn) {
            selectedServer = serverKey;
            document.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        async function startProcess() {
            const btn = document.getElementById('mainLaunchBtn');
            btn.disabled = true;
            btn.innerHTML = "⏳ CRÉATION EN COURS...";

            try {
                const conf = CONFIG_GLOBAL[selectedServer];
                const duration = (selectedServer === "DINO_VIP") ? "99" : "1";
                let url = "";

                if (conf.type === "STD" || conf.type === "DINO") {
                    url = `${conf.url}?action=new&api_key=${conf.key}&type=m3u&sub=${duration}&pack=${conf.pack}`;
                } else {
                    url = `${conf.url}?action=user&type=create&api_key=${conf.key}&package_id=${conf.pack}`;
                }

                const res = await fetch(url);
                const result = await res.json();
                const data = result[0];

                if (data?.status === "true" || data?.status === true) {
                    showModal(data, 50);
                    btn.innerHTML = "✅ SUCCÈS !";
                } else {
                    alert("Erreur: " + (data?.message || "Serveur indisponible"));
                    btn.innerHTML = "❌ RÉESSAYER";
                    btn.disabled = false;
                }
            } catch (e) {
                alert("Erreur réseau");
                btn.disabled = false;
            }
        }

        function showModal(data, points) {
            document.getElementById('resHost').innerText = data.dns || data.url?.split('/get.php')[0] || "Portail Premium";
            document.getElementById('resUser').innerText = data.username || data.code || "N/A";
            document.getElementById('resPass').innerText = data.password || "N/A";
            document.getElementById('pointsEarned').innerText = "💰 +" + points + " HisL GAGNÉS !";
            document.getElementById('accessModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('accessModal').style.display = 'none'; }
        function copyAccess() {
            const h = document.getElementById('resHost').innerText;
            const u = document.getElementById('resUser').innerText;
            const p = document.getElementById('resPass').innerText;
            navigator.clipboard.writeText(`Host: ${h}\nUser: ${u}\nPass: ${p}`);
            alert("Copié !");
        }
    </script>
</body>
</html>
