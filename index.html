<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourTvSat VIP - Stable</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .gold { color: #d4af37; }
        .card { border: 2px solid #d4af37; border-radius: 20px; padding: 20px; max-width: 400px; margin: auto; background: #0a0a0a; }
        .btn { background: linear-gradient(135deg, #d4af37, #f9f295); color: #000; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .log { background: #000; color: #00ff00; font-family: monospace; font-size: 0.7rem; padding: 10px; margin-top: 15px; text-align: left; border-radius: 8px; min-height: 50px; }
        #res { display: none; margin-top: 20px; padding: 15px; border: 1px dashed #00ff00; word-break: break-all; font-size: 0.8rem; }
    </style>
</head>
<body>

    <h1 class="gold">YourTvSat VIP</h1>
    <div class="card">
        <p>Générateur de Test Strong 8K</p>
        <button class="btn" onclick="lancer()">🚀 GÉNÉRER MON ACCÈS</button>
        <div id="log" class="log">> Prêt.</div>
        <div id="res"></div>
    </div>

    <script>
        // CONFIGURATION DIRECTE
        const API = "https://my8k.me/api/api.php";
        const KEY = "fbe7199e1b0ea7d1f604bb1d930afa51";
        const DNS_SECOURS = "my8k.me:80"; // Au cas où le lien sort en "http:///"

        function msg(t) { document.getElementById('log').innerText = "> " + t; }

        async function lancer() {
            msg("Connexion au serveur...");
            const target = `${API}?action=new&api_key=${KEY}&type=m3u&sub=1&pack=all`;
            
            try {
                // Utilisation d'un proxy pour éviter les erreurs CORS
                const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(target)}`);
                const j = await r.json();
                const d = JSON.parse(j.contents)[0] || JSON.parse(j.contents);

                if (d.statut === "vrai" || d.status === "true") {
                    let final = d.url;
                    if(final.includes("http:///")) {
                        final = final.replace("http:///", `http://${DNS_SECOURS}/`);
                    }
                    document.getElementById('res').style.display = "block";
                    document.getElementById('res').innerText = "LIEN : " + final;
                    msg("✅ GÉNÉRATION RÉUSSIE");
                } else {
                    msg("❌ ERREUR : " + (d.message || "Plus de tickets disponibles"));
                }
            } catch (e) {
                msg("🚨 ERREUR RÉSEAU (Proxy)");
            }
        }
    </script>
</body>
</html>
