<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YourTvSat VIP</title>
    <style>
        :root { --gold: #d4af37; --black: #050505; --dark: #111; }
        body { background: var(--black); color: #fff; font-family: sans-serif; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }

        /* 🛰️ SATELLITE DORÉ DYNAMIQUE (Version Ultra-Stable) */
        .sat-container { width: 120px; height: 120px; position: relative; animation: orbit 8s linear infinite; filter: drop-shadow(0 0 10px var(--gold)); margin-bottom: 20px; }
        
        .sat-body { width: 40px; height: 40px; background: linear-gradient(135deg, #f9f295, #d4af37); position: absolute; top: 40px; left: 40px; border-radius: 5px; border: 2px solid #000; }
        .panel { width: 45px; height: 20px; background: #222; border: 1px solid var(--gold); position: absolute; top: 50px; }
        .panel.left { left: -5px; }
        .panel.right { right: -5px; }
        .antenna { width: 2px; height: 30px; background: var(--gold); position: absolute; top: 10px; left: 59px; }

        @keyframes orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .content { text-align: center; width: 100%; max-width: 320px; z-index: 10; }
        .logo { font-size: 2.2rem; font-weight: 900; color: var(--gold); letter-spacing: 5px; margin-top: 10px; text-shadow: 0 0 20px rgba(212,175,55,0.4); }
        .btn-auth { background: #fff; color: #000; padding: 16px; border-radius: 50px; width: 100%; border: none; font-weight: bold; margin-top: 25px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div class="content">
        <div class="sat-container">
            <div class="antenna"></div>
            <div class="panel left"></div>
            <div class="sat-body"></div>
            <div class="panel right"></div>
        </div>

        <div class="logo">YOURTVSAT</div>
        <p style="color:#666; font-size:0.7rem; letter-spacing:3px; margin-top:5px;">PREMIUM STREAMING</p>

        <button class="btn-auth" onclick="alert('Accès Développeur : H.A.ROUIS')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" width="18"> Continuer avec Apple
        </button>
        <button class="btn-auth" style="margin-top:12px;" onclick="alert('Accès Développeur : H.A.ROUIS')">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18"> Continuer avec Google
        </button>
    </div>

</body>
</html>
