<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourTvSat VIP - Debug Mode</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .gold { color: #d4af37; }
        .container { border: 1px solid #d4af37; border-radius: 15px; padding: 20px; max-width: 400px; margin: auto; background: #0a0a0a; }
        .status-card { background: #151515; border-radius: 10px; padding: 15px; margin-bottom: 20px; text-align: left; }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 10px; }
        .green { background: #2ecc71; box-shadow: 0 0 8px #2ecc71; }
        .red { background: #e74c3c; box-shadow: 0 0 8px #e74c3c; }
        .btn-gen { background: linear-gradient(180deg, #f9f295, #d4af37); color: #000; padding: 15px; border-radius: 8px; font-weight: bold; border: none; width: 100%; cursor: pointer; }
        .btn-gen:disabled { background: #444; color: #888; }
        .select-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .opt { flex: 1; padding: 10px; border: 1px solid #444; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        .opt.active { border-color: #d4af37; color: #d4af37; background: rgba(212,175,55,0.1); }
        #output { display: none; background: #111; padding: 15px; border: 1px dashed #d4af37; margin-top: 20px; text-align: left; font-size: 0.8rem; border-radius: 8px; color: #2ecc71; }
    </style>
</head>
<body>
    <h2 class="gold">YOURTVSAT PANEL</h2>
    <div class="container">
        <div class="status-card">
            <div id="strongStat"><span class="dot red"></span> STRONG 8K: Vérification...</div>
            <div id="neoStat" style="margin-top:10px;"><span class="dot red"></span> NEO 4K: Vérification...</div>
        </div>

        <div class="select-box">
            <div id="s1" class="opt active" onclick="sel('STRONG8K','s1')">STRONG 8K</div>
            <div id="s2" class="opt" onclick="sel('NEO4K','s2')">NEO 4K</div>
        </div>

        <button id="btn" class="btn-gen" onclick="start()">GÉNÉRER UN TEST</button>
        <div id="output"></div>
    </div>

    <script>
        const API = {
            STRONG8K: { url: "http://pro.business-cdn-8kpro.ru/api/api.php", key: "fbe7199e1b0ea7d1f604bb1d930afa51" },
            NEO4K: { url: "https://neo4kpro.me/api/api.php", key: "990f58084a19da19da13831da85aaa3d" }
        };
        let current = "STRONG8K";

        function sel(id, el) {
            current = id;
            document.querySelectorAll('.opt').forEach(o => o.classList.remove('active'));
            document.getElementById(el).classList.add('active');
        }

        async function check() {
            for (let k in API) {
                const target = `${API[k].url}?api_key=${API[k].key}&action=new&type=m3u`;
                try {
                    const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(target)}`);
                    const d = await r.json();
                    const res = JSON.parse(d.contents);
                    const ok = res.status === "true" || res.username || (res.message && !res.message.includes("credit"));
                    document.getElementById(k === "STRONG8K" ? "strongStat" : "neoStat").innerHTML = `<span class="dot ${ok ? 'green' : 'red'}"></span> ${k}: ${ok ? 'En ligne' : 'Crédits 0'}`;
                } catch(e) {
                    document.getElementById(k === "STRONG8K" ? "strongStat" : "neoStat").innerHTML = `<span class="dot red"></span> ${k}: Hors ligne`;
                }
            }
        }

        async function start() {
            const b = document.getElementById('btn');
            b.disabled = true; b.innerText = "Création...";
            const s = API[current];
            const target = `${s.url}?api_key=${s.key}&action=new&type=m3u&sub=1&pack=all`;
            
            try {
                const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(target)}`);
                const d = await r.json();
                const res = JSON.parse(d.contents);
                const data = Array.isArray(res) ? res[0] : res;

                if (data.username) {
                    document.getElementById('output').style.display = "block";
                    document.getElementById('output').innerHTML = `<b>TEST GÉNÉRÉ :</b><br>User: ${data.username}<br>Pass: ${data.password}<br>Host: ${data.dns || s.url.split('/api')[0]}`;
                    b.innerText = "SUCCÈS";
                } else {
                    alert("ERREUR PANEL : " + (data.message || "Crédits insuffisants."));
                    b.disabled = false; b.innerText = "RÉESSAYER";
                }
            } catch(e) {
                alert("ERREUR RÉSEAU");
                b.disabled = false; b.innerText = "RÉESSAYER";
            }
        }
        check();
    </script>
</body>
</html>
