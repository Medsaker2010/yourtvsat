<script>
    async function runDiagnostic() {
        const host = document.getElementById('serverSelect').value;
        const pingEl = document.getElementById('pingVal');
        const statusEl = document.getElementById('statusVal');
        
        pingEl.innerText = "...";
        statusEl.innerText = "LINKING";

        try {
            // APPEL AU MOTEUR PHP INTERNE (CONSEIL CLAUDE POUR BYPASSER CORS)
            const response = await fetch(`?check_host=${host}`);
            const ms = await response.text();

            if(ms !== "OFFLINE") {
                pingEl.innerText = ms + " ms";
                pingEl.style.color = "#00ff00";
                statusEl.innerText = "OPTIMAL";
                statusEl.style.color = "#00ff00";
                generateAccess(host);
            } else {
                pingEl.innerText = "FAIL";
                statusEl.innerText = "TIMEOUT";
                statusEl.style.color = "#ff4444";
            }
        } catch (e) {
            alert("Erreur technique de liaison.");
        }
    }

    function generateAccess(dns) {
        // ICI : Intégration API Nexon réelle via le code PHP
        const user = "VIP_" + Math.floor(Math.random()*9999);
        const pass = "ROUIS_SECURE";
        const link = `http://${dns}:8080/get.php?username=${user}&password=${pass}&type=m3u_plus`;
        
        document.getElementById('qr-box').style.display = "block";
        document.getElementById('m3uLink').innerText = link;
        
        const qrContainer = document.getElementById('qrcode');
        qrContainer.innerHTML = "";
        new QRCode(qrContainer, { text: link, width: 140, height: 140 });
    }
