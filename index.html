// --- MOTEUR DE DIAGNOSTIC (BACKEND) ---
// Ce petit script PHP permet de tester les serveurs sans erreur de sécurité
if (isset($_GET['check_host'])) {
    $host = $_GET['check_host'];
    $port = 80;
    $wait = 2; // secondes
    $start = microtime(true);
    $fp = @fsockopen($host, $port, $errno, $errstr, $wait);
    $end = microtime(true);
    
    if ($fp) {
        fclose($fp);
        echo round(($end - $start) * 1000); // Retourne les ms
    } else {
        echo "OFFLINE";
    }
    exit; // Arrête l'exécution ici pour ne pas charger le HTML
}

    <script>
        async function startDiagnostic() {
            const host = document.getElementById('server').value;
            const spinner = document.getElementById('spinner');
            
            spinner.style.display = "block";
            document.getElementById('pingValue').innerText = "...";
            document.getElementById('statusValue').innerText = "LINKING";

            // APPEL AU MOTEUR PHP (L'ASTUCE DU CODE DUR)
            try {
                const response = await fetch(`?check_host=${host}`);
                const data = await response.text();
                
                spinner.style.display = "none";

                if(data !== "OFFLINE") {
                    document.getElementById('pingValue').innerText = data + " ms";
                    document.getElementById('pingValue').style.color = "#00ff00";
                    document.getElementById('statusValue').innerText = "OPTIMAL";
                    document.getElementById('statusValue').style.color = "#00ff00";
                    generateQR(host);
                } else {
                    document.getElementById('pingValue').innerText = "ERROR";
                    document.getElementById('statusValue').innerText = "OFFLINE";
                    document.getElementById('statusValue').style.color = "#ff4444";
                }
            } catch (e) {
                spinner.style.display = "none";
                alert("Erreur de connexion au moteur de diagnostic.");
            }
        }

        function generateQR(dns) {
            const user = "<?php echo $user_iptv; ?>"; // Vrai utilisateur PHP
            const pass = "<?php echo $pass_iptv; ?>"; // Vrai mot de passe PHP
            const link = `http://${dns}:8080/get.php?username=${user}&password=${pass}&type=m3u_plus`;
            
            document.getElementById('infoLink').innerText = link;
            const qrDiv = document.getElementById('qrcode');
            qrDiv.innerHTML = "";
            new QRCode(qrDiv, { text: link, width: 140, height: 140 });
        }
