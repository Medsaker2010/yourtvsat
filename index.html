<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourTvSat VIP Elite</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding-bottom: 50px; }
        .gold { color: #d4af37; }
        .header { padding: 30px 0; position: relative; display: flex; justify-content: center; align-items: center; }
        .sat { font-size: 40px; position: absolute; animation: orbit 5s infinite ease-in-out; z-index: 5; }
        .brand { font-size: 1.8rem; font-weight: 900; z-index: 10; text-transform: uppercase; line-height: 1.1; }
        @keyframes orbit {
            0% { transform: translateX(-110px) scale(1.1); z-index: 15; }
            50% { transform: translateX(110px) scale(0.6); opacity: 0.4; z-index: 1; }
            100% { transform: translateX(-110px) scale(1.1); z-index: 15; }
        }
        .page { display: none; padding: 20px; }
        .active { display: block !important; }
        .big-price { font-size: 5rem; font-weight: 900; color: #d4af37; margin: 10px 0; }
        .btn-luxe {
            background: linear-gradient(135deg, #d4af37, #f9f295, #d4af37);
            color: #000; padding: 20px 40px; border-radius: 50px; font-weight: 900; text-decoration: none; display: inline-block;
            box-shadow: 0 10px 30px rgba(212,175,55,0.4); border: none;
        }
        .pill-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; padding: 20px; max-width: 600px; margin: auto; }
        .pill { 
            background: transparent; color: #d4af37; border: 2px solid #d4af37; 
            padding: 10px 18px; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .pill.active { background: #d4af37; color: #000; box-shadow: 0 0 15px rgba(212, 175, 55, 0.5); }
        .btn-generate {
            background: linear-gradient(135deg, #d4af37, #f9f295, #d4af37);
            color: #000; padding: 20px 40px; border-radius: 12px; font-size: 1.2rem; font-weight: 900;
            border: none; cursor: pointer; margin-top: 30px; width: 90%; max-width: 400px;
        }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: #111; border: 2px solid #d4af37; border-radius: 20px; padding: 30px; width: 85%; max-width: 400px; }
        .result-box { background: #1a1a1a; padding: 15px; border-radius: 10px; border-left: 5px solid #00ff00; text-align: left; margin: 20px 0; font-family: monospace; font-size: 0.9rem; word-break: break-all; }
    </style>
</head>
<body>

    <div class="header">
        <div class="sat">🛰️</div>
        <h1 class="brand gold">YOURTVSAT<br><span style="font-size:0.8rem; letter-spacing:3px; color:#fff;">PANEL VIP ELITE</span></h1>
    </div>

    <div id="p-vente" class="page active">
        <div class="big-price">5.55 €</div>
        <a href="https://buy.stripe.com/6oU7sL9gXfgTeKuf7h" class="btn-luxe">💎 ACCÈS VIP ILLIMITÉ</a>
    </div>

    <div id="p-vip" class="page">
        <h3 class="gold">1. CHOISISSEZ VOTRE SERVEUR</h3>
        <div class="pill-container" id="pillContainer"></div>
        <button id="genBtn" class="btn-generate" onclick="startGeneration()">🚀 GÉNÉRER MON TEST 24H</button>
    </div>

    <div id="resultModal" class="modal">
        <div class="modal-content">
            <h2 class="gold">🏆 TEST GÉNÉRÉ</h2>
            <div class="result-box">
                <p>🌐 <b>Host:</b> <span id="outHost"></span></p>
                <p>👤 <b>User:</b> <span id="outUser"></span></p>
                <p>🔑 <b>Pass:</b> <span id="outPass"></span></p>
            </div>
            <button onclick="copyResult()" style="background:#d4af37; border:none; padding:12px; border-radius:8px; width:100%; font-weight:bold; cursor:pointer;">📋 COPIER LES ACCÈS</button>
            <p onclick="closeModal()" style="margin-top:20px; cursor:pointer; color:#888;">Fermer</p>
        </div>
    </div>

    <script>
        const API_CONFIG = {
            STRONG8K: { 
                name: "STRONG 8K", 
                url: "http://pro.business-cdn-8kpro.ru/api/api.php", 
                key: "fbe7199e1b0ea7d1f604bb1d930afa51", 
                type: "STD", 
                pack: "all" 
            },
            NEO4K: { name: "NEO 4K", url: "https://neo4kpro.me/api/api.php", key: "990f58084a19da19da13831da85aaa3d", type: "STD", pack: "all" },
            DINO_VIP: { name: "DINO VIP", url: "https://tvpluspanel.net/api/api.php", key: "a541fa9acb43c9be2f2759ca4ac5a47c", type: "DINO", pack: "all" },
            EAGLE4K: { name: "EAGLE 4K", url: "http://api-elg-26.com/api/dev_api.php", key: "A0F121281A26DB634862390DC531DA6D204DD91E74516071", type: "DEV", pack: "1" }
        };

        let currentServer = "STRONG8K";

        (function init() {
            const url = new URLSearchParams(window.location.search);
            if (url.get('admin') === 'true' || url.get('success') === 'true') {
                document.getElementById('p-vente').classList.remove('active');
                document.getElementById('p-vip').classList.add('active');
                setupPills();
            }
        })();

        function setupPills() {
            const container = document.getElementById('pillContainer');
            container.innerHTML = "";
            Object.keys(API_CONFIG).forEach(key => {
                const btn = document.createElement('button');
                btn.className = `pill ${key === currentServer ? 'active' : ''}`;
                btn.innerText = API_CONFIG[key].name;
                btn.onclick = () => {
                    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
                    btn.classList.add('active');
                    currentServer = key;
                };
                container.appendChild(btn);
            });
        }

        async function startGeneration() {
            const btn = document.getElementById('genBtn');
            btn.disabled = true;
            btn.innerText = "⌛ GÉNÉRATION EN COURS...";

            try {
                const conf = API_CONFIG[currentServer];
                const sub = (currentServer === "DINO_VIP") ? "99" : "1";
                
                let apiUrl = (conf.type === "STD" || conf.type === "DINO") 
                    ? `${conf.url}?action=new&api_key=${conf.key}&type=m3u&sub=${sub}&pack=${conf.pack}`
                    : `${conf.url}?action=user&type=create&api_key=${conf.key}&package_id=${conf.pack}`;

                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`;

                const response = await fetch(proxyUrl);
                const result = await response.json();
                
                // On essaie de lire les données renvoyées par le serveur
                const rawData = JSON.parse(result.contents);
                const data = rawData[0];

                if (data && (data.status === "true" || data.status === true)) {
                    document.getElementById('outHost').innerText = data.dns || "http://pro.business-cdn-8kpro.ru";
                    document.getElementById('outUser').innerText = data.username || data.code || "N/A";
                    document.getElementById('outPass').innerText = data.password || "N/A";
                    document.getElementById('resultModal').style.display = 'flex';
                    btn.innerText = "✅ GÉNÉRÉ !";
                } else {
                    // On affiche le message d'erreur réel du panel pour comprendre
                    const msg = data?.message || "Erreur de configuration API.";
                    alert("Réponse Panel : " + msg);
                    btn.innerText = "❌ RÉESSAYER";
                    btn.disabled = false;
                }
            } catch (e) {
                alert("Erreur technique de connexion au panel.");
                btn.disabled = false;
                btn.innerText = "❌ RÉESSAYER";
            }
        }

        function closeModal() { document.getElementById('resultModal').style.display = 'none'; document.getElementById('genBtn').disabled = false; document.getElementById('genBtn').innerText = "🚀 GÉNÉRER MON TEST 24H"; }
        function copyResult() {
            const text = `Host: ${document.getElementById('outHost').innerText}\nUser: ${document.getElementById('outUser').innerText}\nPass: ${document.getElementById('outPass').innerText}`;
            navigator.clipboard.writeText(text);
            alert("Identifiants copiés !");
        }
    </script>
</body>
</html>
