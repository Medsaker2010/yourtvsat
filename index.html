<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOURTVSAT - Dashboard VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0a0a0a;
            --card-bg: #151515;
            --text-light: #ffffff;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        /* --- DIAGNOSTIC CARD --- */
        .diagnostic-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border: 1px solid #222;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 25px;
        }

        .server-label {
            color: #888;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ping-value {
            font-size: 48px;
            font-weight: 700;
            color: var(--gold);
            margin: 10px 0;
        }

        .status-optimal {
            color: #00ff88;
            font-weight: 600;
            font-size: 14px;
        }

        /* --- NOUVEL ASCENSEUR CLASSE --- */
        .select-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .custom-select {
            appearance: none;
            -webkit-appearance: none;
            width: 100%;
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
            color: var(--gold);
            border: 1.5px solid var(--gold);
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            transition: 0.3s;
        }

        .custom-select:hover {
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .select-wrapper::after {
            content: '▼';
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
            pointer-events: none;
        }

        /* --- BOUTONS --- */
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            margin-bottom: 15px;
        }

        .btn-rescan {
            background-color: var(--gold);
            color: #000;
        }

        .btn-qr {
            background-color: transparent;
            border: 1.5px solid var(--gold);
            color: var(--gold);
        }

        .btn:active {
            transform: scale(0.98);
        }

    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: var(--gold);">VOTRE TV SAT PRO</h2>

    <div class="diagnostic-card">
        <span class="server-label" id="current-server-name">SÉLECTIONNEZ UN SERVEUR</span>
        <div class="ping-value" id="ping-display">-- ms</div>
        <div class="status-optimal" id="status-text">PRÊT AU SCAN</div>
    </div>

    <div class="select-wrapper">
        <select class="custom-select" id="server-select">
            <option value="http://votre-dns-strong.com">STRONG 8
