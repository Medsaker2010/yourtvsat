<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourTvSat VIP - Debug Mode</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; }
        .gold { color: #d4af37; text-shadow: 0 0 10px rgba(212,175,55,0.5); }
        .pill-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .pill { background: transparent; color: #d4af37; border: 1px solid #d4af37; padding: 8px 15px; border-radius: 50px; cursor: pointer; font-size: 0.8rem; }
        .pill.active { background: #d4af37; color: #000; font-weight: bold; }
        .console { background: #000; border: 1px solid #333; color: #00ff00; font-family: monospace; font-size: 0.75rem; padding: 15px; text-align: left; border-radius: 10px; margin-top: 20px; max-height: 200px; overflow-y: auto; }
        .btn-main { background: linear-gradient(135deg, #d4af37, #f9f295); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: 900; width: 100%; max-width: 350px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <h1 class="gold">ENGINE DEBUG v2.1</h1>

    <div class="pill-container" id="srvList">
        <button class="pill active" onclick="sel('STRONG8K', this)">STRONG 8K</button>
        <button class="pill" onclick="sel('NEO4K', this)">NEO 4K</button>
        <button class="pill" onclick="sel('NEXON4K', this)">NEXON 4K</button>
        <button class="pill" onclick="sel('EAGLE4K', this)">EAGLE 4K</button>
        <button class="pill" onclick="sel('FUEGO', this)">FUEGO TV</button>
        <button class="pill" onclick="sel('DINO_VIP', this)">DINO VIP</button>
    </div>

    <button class="btn-main" id="go" onclick="process()">🚀 GÉNÉRER L'ABONNEMENT (1 MOIS)</button>

    <div class="console" id="log">Awaiting command...</div>

    <script>
        const CONFIG = {
            STRONG8K: { url: "https://my8k.me/api/api.php", key: "fbe7199e1b0ea7d1f604bb1d930afa51", type: "STD", pack: "all" },
            NEO4K:    { url: "https://neo4kpro.me/api/api.php", key: "990f58084a19da19da13831da85aaa3d", type: "STD", pack: "all" },
            NEXON4K:  { url: "http://api-connect.icu/api/dev_api.php", key: "90E655F4EC3A04B518A98B189D2E62BE4E18BDBA2E2F7114", type: "DEV", pack: "1" },
            EAGLE4K:  { url: "http://api-elg-26.com/api/dev_api.php", key: "A0F121281A26DB634862390DC531DA6D204DD91E74516071", type: "DEV", pack: "1" },
            FUEGO:    { url: "http://api-cdn-fug.com/api/dev_api.php", key: "27F6CD585F600B5E8F35C88F5D19016C9101CD354BD69BE8", type: "DEV", pack: "1" },
            DINO_VIP: { url: "https://tvpluspanel.net/api/api.php", key: "a541fa9acb43c9be2f2759ca4ac5a47c", type: "DINO", pack: "all" }
        };

        let selected = "STRONG8K";
        const logger = (m) => { document.getElementById('log').innerHTML += `<br>> ${m}`; };

        function sel(k, b) {
            selected = k;
            document.querySelectorAll('.pill').forEach(btn => btn.classList.remove('active'));
            b.classList.add('active');
        }

        async function process() {
            const btn = document.getElementById('go');
            btn.disabled = true;
            btn.innerText = "TRAITEMENT...";
            const c = CONFIG[selected];
            
            // Construction de l'URL selon le type de serveur
            let target = "";
            if (c.type === "STD" || c.type === "DINO") {
                target = `${c.url}?action=new&api_key=${c.key}&type=m3u&sub=1&pack=${c.pack}`;
            } else {
                target = `${c.url}?action=user&type=create&api_key=${c.key}&package_id=${c.pack}`;
            }

            logger(`Cible: ${selected} (${c.type})`);
            
            try {
                // Proxy AllOrigins pour contourner le CORS
                const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`;
                const r = await fetch(proxy);
                const j = await r.json();
                
                // Extraction propre des données
                let data = typeof j.contents === 'string' ? JSON.parse(j.contents) : j.contents;
                if (Array.isArray(data)) data = data[0];

                logger(`Réponse reçue: ${JSON.stringify(data).substring(0, 50)}...`);

                if (data.username || data.status === "true" || data.status === true) {
                    logger("✅ SUCCÈS : Ligne créée.");
                    alert(`SUCCÈS !\nUser: ${data.username || data.code}\nPass: ${data.password || 'N/A'}`);
                } else {
                    logger(`❌ REFUS PANEL : ${data.message || 'Erreur inconnue'}`);
                    alert("ERREUR : " + (data.message || "Crédits ou droits insuffisants"));
                }
            } catch (e) {
                logger("🚨 ERREUR RÉSEAU : Relais bloqué ou serveur HS.");
            }
            btn.disabled = false;
            btn.innerText = "🚀 GÉNÉRER L'ABONNEMENT (1 MOIS)";
        }
    </script>
</body>
</html>
