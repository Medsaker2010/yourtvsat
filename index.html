<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourTvSat VIP Elite</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .gold { color: #d4af37; }
        .container { border: 2px solid #d4af37; border-radius: 20px; padding: 20px; max-width: 450px; margin: auto; background: #111; box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        .status-box { background: #1a1a1a; border-radius: 12px; padding: 15px; margin-bottom: 20px; text-align: left; border: 1px solid #333; }
        .status-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .green { background: #2ecc71; box-shadow: 0 0 8px #2ecc71; }
        .red { background: #ff4d4d; box-shadow: 0 0 8px #ff4d4d; }
        .orange { background: #f39c12; box-shadow: 0 0 8px #f39c12; }
        .pill-container { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 20px 0; }
        .pill { background: none; color: #d4af37; border: 1px solid #d4af37; padding: 10px 18px; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        .pill.active { background: #d4af37; color: #000; font-weight: bold; }
        .btn-gen { background: linear-gradient(135deg, #d4af37, #f9f295, #d4af37); color: #000; padding: 18px; border-radius: 12px; font-weight: 900; border: none; cursor: pointer; width: 100%; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .btn-gen:disabled { opacity: 0.5; cursor: not-allowed; }
        .result-box { background: #000; padding: 15px; border-radius: 10px; border-left: 5px solid #2ecc71; text-align: left; margin-top: 20px; display: none; font-family: monospace; }
    </style>
</head>
<body>

    <h1 class="gold" style="letter-spacing: 2px;">YOURTVSAT VIP</h1>

    <div class="container">
        <div class="status-box">
            <div style="font-size: 0.7rem; color: #888; margin-bottom: 10px; text-transform: uppercase; font-weight: bold;">📊 État des serveurs</div>
            <div id="statusList"></div>
            <button onclick="checkStatus()" style="background:none; border:none; color:#d4af37; font-size:0.7rem; cursor:pointer; padding:0; margin-top:5px;">🔄 Actualiser</button>
        </div>

        <h3 class="gold">GÉNÉRER UN TEST 24H</h3>
        <div class="pill-container" id="pillContainer"></div>
        
        <button id="genBtn" class="btn-gen" onclick="startGeneration()">🚀 LANCER LA GÉNÉRATION</button>

        <div id="resultBox" class="result-box">
            <p style="color:#2ecc71; font-weight:bold; margin:0 0 10px 0;">✅ ACCÈS GÉNÉRÉS :</p>
            <div id="resDetails"></div>
        </div>
    </div>

    <script>
        const API_CONFIG = {
            STRONG8K: { name: "STRONG 8K", url: "http://pro.business-cdn-8kpro.ru/api/api.php", key: "fbe7199e1b0ea7d1f604bb1d930afa51" },
            NEO4K: { name: "NEO 4K", url: "https://neo4kpro.me/api/api.php", key: "990f58084a19da19da13831da85aaa3d" }
        };

        // Liste de proxys pour éviter les blocages
        const PROXIES = [
            "https://cors-anywhere.herokuapp.com/",
            "https://api.allorigins.win/raw?url="
        ];

        let currentServer = "STRONG8K";

        async function tryFetch(targetUrl) {
            for (let proxy of PROXIES) {
                try {
                    const res = await fetch(proxy + encodeURIComponent(targetUrl), { method: 'GET' });
                    if (res.ok) return await res.json();
                } catch (e) { continue; }
            }
            throw new Error("Tous les proxys ont échoué");
        }

        async function checkStatus() {
            const list = document.getElementById('statusList');
            list.innerHTML = "<small>Vérification...</small>";
            
            let html = "";
            for (const [id, conf] of Object.entries(API_CONFIG)) {
                try {
                    const url = `${conf.url}?api_key=${conf.key}&action=new&type=m3u&sub=1&pack=all`;
                    // On utilise allorigins pour le diagnostic car il ne demande pas d'activation manuelle
                    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                    const data = JSON.parse((await res.json()).contents);
                    
                    const isOk = (data && (data.status === "true" || data.status === true || data.username));
                    html += `<div class="status-item"><span>${conf.name}</span><span><span class="dot ${isOk ? 'green' : 'orange'}"></span> <small>${isOk ? 'Prêt' : 'Crédits 0'}</small></span></div>`;
                } catch (e) {
                    html += `<div class="status-item"><span>${conf.name}</span><span><span class="dot red"></span> <small>Hors ligne</small></span></div>`;
                }
            }
            list.innerHTML = html;
        }

        function setupPills() {
            const container = document.getElementById('pillContainer');
            Object.keys(API_CONFIG).forEach(key => {
                const btn = document.createElement('button');
                btn.className = `pill ${key === currentServer ? 'active' : ''}`;
                btn.innerText = API_CONFIG[key].name;
                btn.onclick = () => {
                    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
                    btn.classList.add('active');
                    currentServer = key;
                };
                container.appendChild(btn);
            });
        }

        async function startGeneration() {
            const btn = document.getElementById('genBtn');
            const resBox = document.getElementById('resultBox');
            btn.disabled = true;
            btn.innerText = "⌛ TRAITEMENT EN COURS...";
            resBox.style.display = 'none';

            const conf = API_CONFIG[currentServer];
            const target = `${conf.url}?api_key=${conf.key}&action=new&type=m3u&sub=1&pack=all`;

            try {
                // Tentative avec AllOrigins (plus stable sur mobile)
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(target)}`);
                const rawData = await response.json();
                const data = JSON.parse(rawData.contents);
                const result = Array.isArray(data) ? data[0] : data;

                if (result && (result.status === "true" || result.status === true || result.username)) {
                    document.getElementById('resDetails').innerHTML = `
                        <b>URL :</b> ${result.dns || 'http://pro.business-cdn-8kpro.ru'}<br>
                        <b>USER :</b> ${result.username}<br>
                        <b>PASS :</b> ${result.password}
                    `;
                    resBox.style.display = 'block';
                    btn.innerText = "✅ RÉUSSI";
                } else {
                    alert("PANEL : " + (result.message || "Crédits insuffisants pour ce serveur."));
                    resetBtn();
                }
            } catch (e) {
                alert("ERREUR RÉSEAU : Le serveur IPTV ne répond pas ou vos crédits sont épuisés.");
                resetBtn();
            }
        }

        function resetBtn() {
            const btn = document.getElementById('genBtn');
            btn.disabled = false;
            btn.innerText = "🚀 RÉESSAYER";
        }

        setupPills();
        checkStatus();
    </script>
</body>
</html>
