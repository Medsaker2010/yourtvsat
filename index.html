<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOURTVSAT CHAMPION v10</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #d4af37; --dark: #000; --green: #00ff00; }
        body { background: var(--dark); color: #fff; font-family: sans-serif; text-align: center; padding: 10px; }
        .card { border: 2px solid var(--gold); border-radius: 20px; padding: 20px; max-width: 400px; margin: auto; background: #050505; }
        .console { background: #000; color: var(--green); font-family: monospace; font-size: 0.7rem; padding: 10px; height: 100px; overflow-y: auto; border: 1px solid #222; margin: 15px 0; text-align: left; }
        .btn { border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin: 5px 0; text-transform: uppercase; color: #fff; }
        .neo { background: #0052cc; } .strong { background: #cc0000; } .fix { background: #222; border: 1px solid var(--gold); color: var(--gold); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; z-index: 100; }
        .m-box { background: #111; border: 2px solid var(--gold); padding: 20px; border-radius: 20px; width: 90%; max-width: 350px; }
        #qr { background: #fff; padding: 10px; display: inline-block; margin: 15px 0; border-radius: 10px; }
    </style>
</head>
<body>

    <h2 style="color:var(--gold)">YOURTVSAT CHAMPION</h2>

    <div class="card">
        <button class="btn neo" onclick="run('NEO')">⚡ TEST NEO 4K</button>
        <button class="btn strong" onclick="run('STRONG')">🔥 TEST STRONG 8K</button>
        <button class="btn fix" onclick="repair()">🔧 RÉPARER URL CASSÉE</button>
        <div class="console" id="log">> SYSTÈME PRÊT.</div>
    </div>

    <div id="modal" class="modal"><div class="m-box">
        <h3 id="m-title" style="color:var(--gold)">SUCCÈS</h3>
        <div id="url" style="font-size:0.65rem; color:var(--green); word-break:break-all; background:#000; padding:10px; border:1px solid #333;"></div>
        <div id="qr"></div>
        <button class="btn" style="background:var(--gold); color:#000" onclick="copy()">COPIER LE LIEN</button>
        <p style="color:#555; cursor:pointer" onclick="closeM()">[ FERMER ]</p>
    </div></div>

    <script>
        // ⚡ CONFIGURATION BRUTE - REMPLACEZ PAR VOS ACCÈS
        const CONFIG = {
            NEO: { api: "https://votre-panel-neo.com/api/api.php", key: "VOTRE_KEY_NEO", dns: "flux-neo.com:80" },
            STRONG: { api: "https://votre-panel-strong.com/api/api.php", key: "VOTRE_KEY_STRONG", dns: "flux-strong.com:80" }
        };

        const l = (m) => { const e = document.getElementById('log'); e.innerText += `\n> ${m}`; e.scrollTop = e.scrollHeight; };

        async function run(type) {
            const s = CONFIG[type];
            if(s.key.includes("VOTRE")) { alert("Configure d'abord les API dans le code !"); return; }
            if(!confirm(`Confirmer le test ${type} ? (Vérifiez vos tickets démo)`)) return;

            l(`Connexion ${type}...`);
            const target = `${s.api}?action=new&type=m3u&sub=99&pack=all&api_key=${s.key}`;
            
            try {
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(target)}&t=${Date.now()}`);
                const data = await response.json();
                const res = JSON.parse(data.contents)[0] || JSON.parse(data.contents);

                if (res.statut === "vrai" || res.status === "true") {
                    let u = res.url.replace("http:///", `http://${s.dns}/`);
                    document.getElementById('url').innerText = u;
                    document.getElementById('qr').innerHTML = "";
                    new QRCode(document.getElementById('qr'), {text: u, width: 140, height: 140});
                    document.getElementById('modal').style.display = 'flex';
                    l("✅ GÉNÉRÉ !");
                } else { l(`❌ REFUS : ${res.message}`); }
            } catch (e) { l("🚨 ERREUR PROXY"); }
        }

        function repair() {
            const old = prompt("URL à réparer :");
            if(old) {
                const dns = prompt("Nouveau DNS (ex: host:80) :", "line.dndnscloud.ru:80");
                const fixed = old.replace(/http:\/\/.*?\//, `http://${dns}/`);
                document.getElementById('url').innerText = fixed;
                document.getElementById('modal').style.display = 'flex';
            }
        }

        function copy() { navigator.clipboard.writeText(document.getElementById('url').innerText); alert("Copié !"); }
        function closeM() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
