<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourTvSat VIP</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .gold { color: #d4af37; }
        .container { border: 2px solid #d4af37; border-radius: 20px; padding: 20px; max-width: 400px; margin: auto; background: #111; }
        .pill-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 20px 0; }
        .pill { background: none; color: #d4af37; border: 2px solid #d4af37; padding: 10px; border-radius: 50px; cursor: pointer; font-weight: bold; }
        .pill.active { background: #d4af37; color: #000; }
        .btn-gen { background: linear-gradient(135deg, #d4af37, #f9f295, #d4af37); color: #000; padding: 18px; border-radius: 12px; font-weight: 900; border: none; cursor: pointer; width: 100%; font-size: 1.1rem; }
        .result-box { background: #000; padding: 15px; border-radius: 10px; border: 1px solid #333; border-left: 5px solid #00ff00; text-align: left; margin-top: 20px; font-family: monospace; display: none; }
    </style>
</head>
<body>

    <h1 class="gold">YOURTVSAT VIP</h1>

    <div class="container">
        <h3 class="gold">CHOISISSEZ LE SERVEUR</h3>
        <div class="pill-container" id="pillContainer"></div>
        
        <button id="genBtn" class="btn-gen" onclick="startGeneration()">🚀 GÉNÉRER TEST 24H</button>

        <div id="resultBox" class="result-box">
            <p>🌐 <b>Host:</b> <span id="outHost"></span></p>
            <p>👤 <b>User:</b> <span id="outUser"></span></p>
            <p>🔑 <b>Pass:</b> <span id="outPass"></span></p>
        </div>
    </div>

    <script>
        const API_CONFIG = {
            STRONG8K: { name: "STRONG 8K", url: "http://pro.business-cdn-8kpro.ru/api/api.php", key: "fbe7199e1b0ea7d1f604bb1d930afa51" },
            NEO4K: { name: "NEO 4K", url: "https://neo4kpro.me/api/api.php", key: "990f58084a19da19da13831da85aaa3d" }
        };

        let currentServer = "STRONG8K";

        function setupPills() {
            const container = document.getElementById('pillContainer');
            Object.keys(API_CONFIG).forEach(key => {
                const btn = document.createElement('button');
                btn.className = `pill ${key === currentServer ? 'active' : ''}`;
                btn.innerText = API_CONFIG[key].name;
                btn.onclick = () => {
                    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
                    btn.classList.add('active');
                    currentServer = key;
                };
                container.appendChild(btn);
            });
        }
        setupPills();

        async function startGeneration() {
            const btn = document.getElementById('genBtn');
            btn.disabled = true;
            btn.innerText = "⌛ GÉNÉRATION...";

            const conf = API_CONFIG[currentServer];
            const targetUrl = `${conf.url}?api_key=${conf.key}&action=new&type=m3u&sub=1&pack=all`;
            
            // Relais pour GitHub
            const proxy = "https://cors-anywhere.herokuapp.com/" + targetUrl;

            try {
                const response = await fetch(proxy);
                const data = await response.json();
                const result = Array.isArray(data) ? data[0] : data;

                if (result && (result.status === "true" || result.status === true)) {
                    document.getElementById('outHost').innerText = result.dns || "http://pro.business-cdn-8kpro.ru";
                    document.getElementById('outUser').innerText = result.username;
                    document.getElementById('outPass').innerText = result.password;
                    document.getElementById('resultBox').style.display = 'block';
                    btn.innerText = "✅ TERMINÉ";
                } else {
                    alert("Erreur Panel : Crédits insuffisants ou IP bloquée.");
                    btn.disabled = false;
                    btn.innerText = "🚀 RÉESSAYER";
                }
            } catch (e) {
                alert("Erreur : Cliquez d'abord sur le bouton bleu de CORS Anywhere.");
                window.open("https://cors-anywhere.herokuapp.com/corsdemo", "_blank");
                btn.disabled = false;
                btn.innerText = "🚀 RÉESSAYER";
            }
        }
    </script>
</body>
</html>
