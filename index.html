<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourTvSat VIP - Test Mode v2.7</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; margin: 0; }
        .gold { color: #d4af37; text-shadow: 0 0 10px rgba(212,175,55,0.5); }
        .card { border: 1px solid #d4af37; border-radius: 20px; padding: 25px; max-width: 450px; margin: auto; background: #0a0a0a; box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
        .pill-container { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; }
        .pill { background: transparent; color: #d4af37; border: 1px solid #d4af37; padding: 6px 12px; border-radius: 50px; cursor: pointer; font-size: 0.75rem; transition: 0.3s; }
        .pill.active { background: #d4af37; color: #000; font-weight: bold; }
        .console { background: #000; border: 1px solid #333; color: #00ff00; font-family: monospace; font-size: 0.7rem; padding: 12px; text-align: left; border-radius: 10px; margin: 15px 0; height: 160px; overflow-y: auto; border-left: 3px solid #d4af37; }
        .btn-main { background: linear-gradient(135deg, #d4af37, #f9f295); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: #111; border: 2px solid #d4af37; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; }
        #qrcode { background: #fff; padding: 10px; border-radius: 10px; display: inline-block; margin: 15px 0; }
    </style>
</head>
<body>

    <h2 class="gold">YOURTVSAT - TEST GENERATOR</h2>

    <div class="card">
        <div class="pill-container">
            <button class="pill active" onclick="sel('DINO_VIP', this)">DINO VIP</button>
            <button class="pill" onclick="sel('STRONG8K', this)">STRONG 8K</button>
            <button class="pill" onclick="sel('NEO4K', this)">NEO 4K</button>
            <button class="pill" onclick="sel('FUEGO', this)">FUEGO TV</button>
            <button class="pill" onclick="sel('EAGLE4K', this)">EAGLE 4K</button>
        </div>

        <button class="btn-main" id="go" onclick="startScan()">⚡ GÉNÉRER TEST GRATUIT (24H)</button>
        <div class="console" id="log">Mode TEST activé...</div>
    </div>

    <div id="m" class="modal"><div class="modal-content">
        <h2 class="gold">🎁 TEST GÉNÉRÉ !</h2>
        <div id="res" style="background:#1a1a1a; padding:15px; border-radius:10px; text-align:left; font-family:monospace; color:#00ff00; font-size:0.8rem;"></div>
        <div id="qrcode"></div>
        <button onclick="copyA()" style="background:#d4af37; border:none; padding:12px; width:100%; border-radius:8px; font-weight:bold; cursor:pointer;">📋 COPIER ACCÈS</button>
        <p onclick="document.getElementById('m').style.display='none'" style="color:#666; cursor:pointer; margin-top:15px;">Fermer</p>
    </div></div>

    <script>
        const CONFIG = {
            DINO_VIP: { url: "https://tvpluspanel.net/api/api.php", key: "a541fa9acb43c9be2f2759ca4ac5a47c", type: "DINO", p: "all", host: "http://tvpluspanel.net" },
            STRONG8K: { url: "https://my8k.me/api/api.php", key: "fbe7199e1b0ea7d1f604bb1d930afa51", type: "STD", p: "all", host: "http://pro.business-cdn-8kpro.ru" },
            NEO4K:    { url: "https://neo4kpro.me/api/api.php", key: "990f58084a19da19da13831da85aaa3d", type: "STD", p: "all", host: "http://neo4kpro.me" },
            FUEGO:    { url: "http://api-cdn-fug.com/api/dev_api.php", key: "27F6CD585F600B5E8F35C88F5D19016C9101CD354BD69BE8", type: "DEV", p: "1", host: "http://fuego-tv.xyz" },
            EAGLE4K:  { url: "http://api-elg-26.com/api/dev_api.php", key: "A0F121281A26DB634862390DC531DA6D204DD91E74516071", type: "DEV", p: "1", host: "http://eagle-4k.xyz" }
        };

        let selected = "DINO_VIP";
        const l = (msg) => { const e = document.getElementById('log'); e.innerHTML += `<br>> ${msg}`; e.scrollTop = e.scrollHeight; };

        function sel(k, b) { selected = k; document.querySelectorAll('.pill').forEach(x => x.classList.remove('active')); b.classList.add('active'); }

        async function apiCall(fullUrl) {
            try {
                let r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(fullUrl)}`);
                let j = await r.json();
                return typeof j.contents === 'string' ? JSON.parse(j.contents) : j.contents;
            } catch (e) {
                let r = await fetch(`https://corsproxy.io/?${encodeURIComponent(fullUrl)}`);
                return await r.json();
            }
        }

        async function attemptGeneration(srvKey) {
            const c = CONFIG[srvKey];
            l(`Test sur ${srvKey}...`);
            
            // Paramètres spécifiques pour TEST 24H
            let params = "";
            if (c.type === "STD" || c.type === "DINO") {
                // Pour DINO/STD, duration=0 ou action=trial
                params = `action=trial&type=m3u&pack=${c.p}&api_key=${c.key}`;
            } else {
                // Pour DEV, package_id de test (souvent 0 ou spécifique)
                params = `action=user&type=create&package_id=test&api_key=${c.key}`;
            }

            let res = await apiCall(c.url + "?" + params);
            if (Array.isArray(res)) res = res[0];

            if (res.username || res.status === "true" || res.status === true) {
                showS(res.username || res.code, res.password || 'N/A', res.dns || c.host);
                return true;
            }
            l(`❌ ${srvKey}: ${res.message || "Indisponible"}`);
            return false;
        }

        async function startScan() {
            const b = document.getElementById('go'); b.disabled = true;
            
            // 1. D'abord tester celui sélectionné par l'utilisateur
            const success = await attemptGeneration(selected);
            
            // 2. Si ça échoue, on scanne les autres automatiquement
            if (!success) {
                l("Recherche d'un autre serveur disponible...");
                for (let key in CONFIG) {
                    if (key !== selected) {
                        const autoOk = await attemptGeneration(key);
                        if (autoOk) break;
                    }
                }
            }
            b.disabled = false;
        }

        function showS(u, p, h) {
            document.getElementById('res').innerText = `H: ${h}\nU: ${u}\nP: ${p}`;
            const link = `${h}/get.php?username=${u}&password=${p}&type=m3u`;
            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: link, width: 120, height: 120 });
            document.getElementById('m').style.display = 'flex';
            l("✅ TEST GÉNÉRÉ AVEC SUCCÈS !");
        }

        function copyA() { navigator.clipboard.writeText(document.getElementById('res').innerText); alert("Copié !"); }
    </script>
</body>
</html>
