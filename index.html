<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YourTvSat VIP - L'Empire du Streaming</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #d4af37; --gold-light: #f9f295; --black: #050505; --dark-grey: #111; --green: #00ff00; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--black); color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; width: 100%; }

        /* --- 🛰️ SATELLITE DORÉ LUXUEUX & DYNAMIQUE --- */
        .sat-wrapper { width: 140px; height: 140px; margin: 0 auto 10px auto; animation: rotateSat 10s linear infinite; filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.7)); }
        
        /* Code SVG détaillé du satellite doré */
        .sat-wrapper svg { width: 100%; height: 100%; fill: url(#goldGradient); }

        /* Animation de rotation continue */
        @keyframes rotateSat { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- LANDING / LOGIN --- */
        #page-login { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; background: radial-gradient(circle at center, #111 0%, #050505 100%); }
        .logo-giant { font-size: clamp(2.5rem, 12vw, 3.5rem); font-weight: 900; color: var(--gold); text-shadow: 0 0 30px rgba(212, 175, 55, 0.5); letter-spacing: 6px; width: 100%; margin-bottom: 5px; }
        .subtitle { font-size: 0.8rem; color: #888; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 50px; }
        
        /* BOUTONS CONNEXION */
        .auth-container { display: flex; flex-direction: column; gap: 15px; width: 320px; max-width: 95%; }
        .auth-btn { background: #fff; color: #000; padding: 16px 25px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 15px; width: 100%; font-size: 1.1rem; box-shadow: 0 8px 25px rgba(0,0,0,0.5); transition: 0.3s; }
        .auth-btn:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(255,255,255,0.1); }

        /* --- DASHBOARD --- */
        #page-dashboard { display: none; padding: 15px; max-width: 500px; margin: auto; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #222; margin-bottom: 20px; }
        .promo-banner { background: linear-gradient(135deg, #111, #000); border: 2px solid var(--gold); border-radius: 25px; padding: 20px; text-align: center; margin-bottom: 25px; box-shadow: 0 0 30px rgba(212, 175, 55, 0.2); }
        
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0 30px; }
        .card { background: var(--dark-grey); border: 1px solid #333; border-radius: 15px; padding: 15px; text-align: center; transition: 0.3s; cursor: pointer; }
        .card.active { border-color: var(--gold); background: #1a1a1a; box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
        .card h4 { font-size: 0.9rem; color: var(--gold); margin-bottom: 5px; }
        .card p { font-size: 0.75rem; color: #aaa; }
    </style>
</head>
<body>

    <section id="page-login">
        <div class="sat-wrapper">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#f9f295" />
                        <stop offset="100%" style="stop-color:#d4af37" />
                    </linearGradient>
                </defs>
                <path d="M12 2L14.5 9H9.5L12 2Z"/>
                <circle cx="12" cy="12" r="3"/>
                <rect x="1" y="10" width="8" height="4" rx="1"/>
                <rect x="15" y="10" width="8" height="4" rx="1"/>
                <path d="M12 15V22M12 15L9 18M12 15L15 18" stroke="url(#goldGradient)" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
        </div>
        
        <div class="logo-giant">YOURTVSAT</div>
        <p class="subtitle">PREMIUM STREAMING EXPERIENCE</p>
        
        <div class="auth-container">
            <button class="auth-btn" onclick="login()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" width="20" alt="Apple">
                Continuer avec Apple
            </button>
            <button class="auth-btn" onclick="login()">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="22" alt="Google">
                Continuer avec Google
            </button>
        </div>
    </section>

    <section id="page-dashboard">
        </section>

    <script>
        function login() {
            document.getElementById('page-login').style.display = 'none';
            document.getElementById('page-dashboard').style.display = 'block';
        }
        // ... reste de ton script ...
    </script>
</body>
</html>
